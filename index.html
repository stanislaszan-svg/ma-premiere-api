<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
            --primary: #6366f1;
            --primary-light: #eef2ff;
            --high: #ef4444;
            --high-light: #fef2f2;
            --medium: #f59e0b;
            --medium-light: #fffbeb;
            --low: #10b981;
            --low-light: #ecfdf5;
            --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
            --shadow: 0 4px 6px -1px rgba(0,0,0,.08), 0 2px 4px -1px rgba(0,0,0,.04);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
            --radius: 12px;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* ── Header ── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; color: var(--primary); }
        .logo-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; }
        .search-wrap { display: flex; align-items: center; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 14px; gap: 8px; width: 340px; transition: border-color .2s, box-shadow .2s; }
        .search-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
        .search-wrap input { border: none; background: none; outline: none; font-family: inherit; font-size: 14px; color: var(--text); width: 100%; }
        .search-wrap input::placeholder { color: var(--text-muted); }

        /* ── Main ── */
        main { max-width: 1400px; margin: 0 auto; padding: 28px; }

        /* ── Stats ── */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 16px; }
        .stat-card { background: var(--surface); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
        .stat-value { font-size: 30px; font-weight: 700; line-height: 1; }
        .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .stats-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .detail-card { background: var(--surface); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        .detail-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px; }
        .priority-bars { display: flex; flex-direction: column; gap: 12px; }
        .priority-row { display: flex; align-items: center; gap: 10px; }
        .priority-label { font-size: 13px; font-weight: 500; width: 58px; flex-shrink: 0; }
        .bar-track { flex: 1; height: 7px; background: var(--border); border-radius: 99px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 99px; transition: width .6s ease; }
        .bar-count { font-size: 13px; font-weight: 600; width: 28px; text-align: right; flex-shrink: 0; color: var(--text-muted); }
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag-stat { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 99px; background: var(--primary-light); color: var(--primary); cursor: pointer; transition: opacity .15s; }
        .tag-stat:hover { opacity: .75; }
        .tag-stat strong { background: var(--primary); color: white; border-radius: 99px; padding: 0 6px; font-size: 11px; }

        /* ── Controls ── */
        .controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .filters { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
        .filter-btn { padding: 7px 14px; border-radius: 7px; border: none; background: none; font-family: inherit; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all .15s; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
        .filter-btn:hover { background: var(--bg); color: var(--text); }
        .filter-btn.active { background: var(--primary); color: white; }
        .filter-btn .count { font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 99px; background: rgba(255,255,255,.25); min-width: 20px; text-align: center; }
        .filter-btn:not(.active) .count { background: var(--bg); color: var(--text-muted); }

        /* ── Task grid ── */
        .tasks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        .empty-state { grid-column: 1/-1; text-align: center; padding: 64px 20px; color: var(--text-muted); }
        .empty-icon { font-size: 52px; margin-bottom: 12px; }
        .empty-state p { font-size: 15px; }

        /* ── Task card ── */
        .task-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; transition: transform .15s, box-shadow .15s; display: flex; flex-direction: column; position: relative; }
        .task-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        .task-card.done { opacity: .6; }
        .task-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; }
        .task-card.priority-high::before { background: var(--high); }
        .task-card.priority-medium::before { background: var(--medium); }
        .task-card.priority-low::before { background: var(--low); }
        .card-body { padding: 18px 18px 14px 22px; flex: 1; }
        .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
        .card-title { font-size: 15px; font-weight: 600; line-height: 1.4; flex: 1; }
        .task-card.done .card-title { text-decoration: line-through; color: var(--text-muted); }
        .priority-badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
        .priority-badge.high { background: var(--high-light); color: var(--high); }
        .priority-badge.medium { background: var(--medium-light); color: var(--medium); }
        .priority-badge.low { background: var(--low-light); color: var(--low); }
        .card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.55; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
        .due-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 500; padding: 3px 8px; border-radius: 6px; background: var(--bg); color: var(--text-muted); }
        .due-badge.overdue { background: var(--high-light); color: var(--high); }
        .due-badge.today { background: var(--medium-light); color: var(--medium); }
        .tag-badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 99px; background: var(--primary-light); color: var(--primary); }
        .card-footer { padding: 10px 18px 10px 22px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: #fafafa; }
        .card-status { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--text-muted); }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #cbd5e1; }
        .dot.active { background: var(--primary); }
        .card-actions { display: flex; gap: 2px; }
        .btn-icon { width: 30px; height: 30px; border-radius: 7px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: background .15s; color: var(--text-muted); }
        .btn-icon:hover { background: var(--bg); color: var(--text); }
        .btn-icon.ok:hover { background: var(--low-light); color: var(--low); }
        .btn-icon.reopen:hover { background: var(--primary-light); color: var(--primary); }
        .btn-icon.del:hover { background: var(--high-light); color: var(--high); }

        /* ── FAB ── */
        .fab { position: fixed; bottom: 32px; right: 32px; width: 56px; height: 56px; border-radius: 16px; background: var(--primary); color: white; border: none; font-size: 26px; cursor: pointer; box-shadow: 0 4px 14px rgba(99,102,241,.4); display: flex; align-items: center; justify-content: center; transition: transform .15s, box-shadow .15s; z-index: 50; }
        .fab:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(99,102,241,.5); }

        /* ── Modal ── */
        .overlay { position: fixed; inset: 0; background: rgba(15,23,42,.45); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s; }
        .overlay.open { opacity: 1; pointer-events: all; }
        .modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 520px; box-shadow: var(--shadow-lg); transform: scale(.95) translateY(12px); transition: transform .2s; }
        .overlay.open .modal { transform: scale(1) translateY(0); }
        .modal-head { padding: 24px 24px 0; display: flex; align-items: center; justify-content: space-between; }
        .modal-title { font-size: 18px; font-weight: 700; }
        .modal-body { padding: 20px 24px; }
        .modal-foot { padding: 0 24px 24px; display: flex; justify-content: flex-end; gap: 10px; }

        /* ── Form ── */
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .form-label span { color: var(--text-muted); font-weight: 400; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 9px; font-family: inherit; font-size: 14px; color: var(--text); background: var(--surface); outline: none; transition: border-color .15s, box-shadow .15s; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
        .form-textarea { resize: vertical; min-height: 80px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .tag-input-wrap { border: 1.5px solid var(--border); border-radius: 9px; padding: 7px 10px; display: flex; flex-wrap: wrap; gap: 6px; cursor: text; transition: border-color .15s, box-shadow .15s; min-height: 44px; align-items: center; }
        .tag-input-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
        .tag-chip { display: inline-flex; align-items: center; gap: 4px; background: var(--primary-light); color: var(--primary); border-radius: 99px; padding: 2px 8px; font-size: 12px; font-weight: 500; }
        .tag-chip button { border: none; background: none; cursor: pointer; color: inherit; font-size: 14px; line-height: 1; padding: 0; opacity: .7; }
        .tag-chip button:hover { opacity: 1; }
        .tag-field { border: none; outline: none; font-family: inherit; font-size: 13px; color: var(--text); flex: 1; min-width: 80px; background: transparent; }

        /* ── Buttons ── */
        .btn { padding: 10px 20px; border-radius: 9px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; border: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #4f46e5; }
        .btn-ghost { background: none; color: var(--text-muted); border: 1.5px solid var(--border); }
        .btn-ghost:hover { background: var(--bg); color: var(--text); }

        /* ── Toast ── */
        .toasts { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 999; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
        .toast { padding: 11px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; color: white; box-shadow: var(--shadow-lg); animation: toastIn .25s ease; white-space: nowrap; }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        .toast.info { background: var(--primary); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* ── History ── */
        .history-divider { display: flex; align-items: center; gap: 10px; margin: 8px 0 12px; color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
        .history-divider::before, .history-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .history-list { max-height: 190px; overflow-y: auto; display: flex; flex-direction: column; }
        .history-entry { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
        .history-entry:last-child { border-bottom: none; }
        .history-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--primary); margin-top: 5px; flex-shrink: 0; }
        .history-content { flex: 1; display: flex; flex-wrap: wrap; align-items: center; gap: 5px; font-size: 12px; min-width: 0; }
        .history-field { font-weight: 600; color: var(--text); background: var(--bg); border-radius: 4px; padding: 1px 6px; flex-shrink: 0; }
        .history-old { color: var(--high); text-decoration: line-through; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .history-new { color: var(--low); font-weight: 500; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .history-arrow { color: var(--text-muted); flex-shrink: 0; }
        .history-time { color: var(--text-muted); font-size: 11px; margin-left: auto; white-space: nowrap; padding-left: 6px; }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .stats-detail { grid-template-columns: 1fr; }
        }
        @media (max-width: 640px) {
            main { padding: 16px; }
            header { padding: 0 16px; }
            .search-wrap { width: 180px; }
            .controls { flex-direction: column; align-items: flex-start; gap: 12px; }
            .filters { flex-wrap: wrap; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">✓</div>
        Task Manager
    </div>
    <div class="search-wrap">
        <span style="font-size:15px;color:var(--text-muted)">🔍</span>
        <input id="searchInput" type="text" placeholder="Rechercher tâches, tags, descriptions…">
    </div>
    <button class="btn btn-primary" onclick="openModal()">+ Nouvelle tâche</button>
</header>

<main>
    <section>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="stats-detail" id="statsDetail"></div>
    </section>

    <div class="controls">
        <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="all">Toutes <span class="count" id="cnt-all">0</span></button>
            <button class="filter-btn" data-filter="today">Aujourd'hui <span class="count" id="cnt-today">0</span></button>
            <button class="filter-btn" data-filter="upcoming">À venir <span class="count" id="cnt-upcoming">0</span></button>
            <button class="filter-btn" data-filter="overdue">En retard <span class="count" id="cnt-overdue">0</span></button>
            <button class="filter-btn" data-filter="done">Terminées <span class="count" id="cnt-done">0</span></button>
        </div>
    </div>

    <div class="tasks-grid" id="tasksGrid"></div>
</main>

<button class="fab" onclick="openModal()" title="Nouvelle tâche (N)">+</button>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="onOverlayClick(event)">
    <div class="modal">
        <div class="modal-head">
            <h2 class="modal-title" id="modalTitle">Nouvelle tâche</h2>
            <button class="btn-icon" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Titre</label>
                <input id="fTitle" class="form-input" type="text" placeholder="Nom de la tâche" required>
            </div>
            <div class="form-group">
                <label class="form-label">Description <span>(optionnel)</span></label>
                <textarea id="fDesc" class="form-textarea" placeholder="Détails supplémentaires…"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Priorité</label>
                    <select id="fPriority" class="form-select">
                        <option value="low">🟢 Basse</option>
                        <option value="medium" selected>🟡 Moyenne</option>
                        <option value="high">🔴 Haute</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Échéance <span>(optionnel)</span></label>
                    <input id="fDueDate" class="form-input" type="date">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Tags <span>(Entrée ou , pour ajouter)</span></label>
                <div class="tag-input-wrap" id="tagWrap" onclick="document.getElementById('tagField').focus()">
                    <input id="tagField" class="tag-field" type="text" placeholder="ex: travail, urgent…">
                </div>
            </div>
        </div>
        <div id="historySection" style="display:none; padding: 0 24px 8px;">
            <div class="history-divider"><span>Historique</span></div>
            <div class="history-list" id="historyList"></div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
            <button class="btn btn-primary" onclick="submitForm()">Enregistrer</button>
        </div>
    </div>
</div>

<div class="toasts" id="toasts"></div>

<script src="/static/script.js"></script>
</body>
</html>
